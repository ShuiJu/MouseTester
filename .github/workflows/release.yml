name: Create release
run-name: Create release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version of the program to build. This will be used for the tag and release name."
        required: true

      pre-release:
        description: "Pre-release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish executable
        run: |
          dotnet publish .\MouseTester\MouseTester.sln -r win-x64 -c Release -p:PublishSingleFile=true --self-contained false -o ./publish

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: MouseTester_v${{ inputs.version }}
          name: MouseTester_v${{ inputs.version }}
          prerelease: ${{ inputs.pre-release }}
          artifacts: ./publish/MouseTester.exe
          generateReleaseNotes: true
